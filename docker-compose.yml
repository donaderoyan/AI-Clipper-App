services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_clipper_backend
    ports:
      - "8000:8000"
    volumes:
      # Sinkronisasi folder data agar video bisa diakses langsung di Windows
      - ./data:/app/data
      # Hot-reload: Sinkronisasi kode agar tidak perlu rebuild tiap ada perubahan
      - ./backend:/app
    environment:
      # Jika Anda menjalankan Ollama di Windows (Host), Docker mengaksesnya via URL ini
      - OLLAMA_URL=http://host.docker.internal:11434
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_clipper_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

    # Jika Anda ingin menjalankan versi build frontend sebagai static site,
    # ganti command di atas dengan container web server (nginx) setelah build.
    # Untuk sekarang, setup ini memudahkan pengembangan React/Vite di Docker.

    # Hapus tanda pagar (uncomment) di bawah ini jika Anda menggunakan GPU Nvidia & WSL2
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]